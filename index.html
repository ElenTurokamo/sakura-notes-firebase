<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сакура — Облачные записки</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --red:    #e53935;
      --yellow: #f9a825;
      --gray:   #9e9e9e;
      --green:  #43a047;
      --blue:   #1e88e5;
      --bg:     #f4f6f9;
      --card:   #ffffff;
      --text:   #212121;
      --muted:  #757575;
      --border: #e0e0e0;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --radius: 18px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .page {
      max-width: 480px;
      margin: 0 auto;
      padding: 20px 16px 80px;
    }

    /* ── TOP AUTH CARD ── */
    .auth-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 22px 24px 18px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }
    .auth-card .user-name-big {
      font-size: 17px;
      font-weight: 800;
      color: var(--text);
      text-align: center;
      margin-bottom: 12px;
    }

    /* ── TIMER ── */
    .timer-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 18px;
    }
    .timer-icon { font-size: 26px; }
    .timer-value {
      font-size: 32px;
      font-weight: 800;
      color: var(--blue);
      letter-spacing: 1px;
    }

    /* ── BUTTONS ── */
    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }
    .btn {
      border: none;
      border-radius: 12px;
      padding: 12px 10px;
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: filter 0.2s, transform 0.15s;
    }
    .btn:active { transform: scale(0.97); }
    .btn:hover { filter: brightness(1.08); }
    .btn-end-session {
      grid-column: 1 / -1;
      background: var(--red);
      color: white;
      margin-bottom: 10px;
    }
    .btn-break   { background: var(--yellow); color: #5d4000; }
    .btn-logout  { background: #bdbdbd;        color: #424242; }

    /* Login state */
    .login-state {
      text-align: center;
    }
    .login-prompt { font-size: 14px; color: var(--muted); margin-bottom: 14px; }
    .btn-google {
      display: inline-flex; align-items: center; gap: 10px;
      background: var(--blue);
      color: white; border: none; border-radius: 12px; padding: 12px 24px;
      font-size: 14px; font-family: 'Nunito', sans-serif; font-weight: 700;
      cursor: pointer; transition: filter 0.2s;
    }
    .btn-google:hover { filter: brightness(1.1); }
    .btn-google svg { width: 18px; height: 18px; }

    /* ── GROUP MONITOR CARD ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px 22px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 15px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    /* ── MEMBER ROW ── */
    .member {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .member:last-child { border-bottom: none; }
    .member-left { display: flex; align-items: center; gap: 10px; }
    .online-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #bdbdbd;
      flex-shrink: 0;
      transition: background 0.4s;
    }
    .online-dot.online  { background: var(--green); box-shadow: 0 0 0 3px rgba(67,160,71,0.2); }
    .online-dot.break   { background: var(--yellow); }
    .online-dot.offline { background: #bdbdbd; }
    .member-name { font-size: 14px; font-weight: 700; }

    .member-right { display: flex; align-items: center; gap: 6px; text-align: right; }
    .member-location { font-size: 12px; color: var(--muted); }
    .member-time {
      font-size: 12px;
      font-weight: 700;
      color: var(--blue);
      min-width: 68px;
      text-align: right;
    }

    .status-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .badge-online  { background: #e8f5e9; color: var(--green); }
    .badge-break   { background: #fff9c4; color: #f57f17; }
    .badge-offline { background: #f5f5f5; color: var(--muted); }

    /* ── CHAT CARD ── */
    .chat-messages {
      background: #f9f9f9;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      min-height: 110px;
      max-height: 220px;
      overflow-y: auto;
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .chat-msg .msg-author { font-weight: 800; font-size: 13px; }
    .chat-msg .msg-text   { font-size: 13px; color: var(--text); }
    .chat-msg .msg-time   { font-size: 11px; color: var(--muted); }

    .chat-input-row {
      display: flex; gap: 8px;
    }
    .chat-input {
      flex: 1;
      padding: 11px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #f5f5f5;
      font-size: 14px;
      font-family: 'Nunito', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .chat-input:focus { border-color: var(--blue); background: white; }
    .btn-send {
      background: var(--green);
      color: white;
      border: none;
      border-radius: 12px;
      width: 46px; height: 46px;
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: filter 0.2s;
      flex-shrink: 0;
    }
    .btn-send:hover { filter: brightness(1.1); }

    /* ── POSTS FEED ── */
    .feed-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      text-align: center;
      margin-bottom: 14px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    #feed { display: flex; flex-direction: column; gap: 14px; }
    .post {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px 20px;
      box-shadow: var(--shadow);
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .post-avatar { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--border); object-fit: cover; }
    .post-name  { font-size: 14px; font-weight: 800; color: var(--text); }
    .post-time  { font-size: 11px; color: var(--muted); }
    .post-text  { font-size: 14px; line-height: 1.6; color: var(--text); }
    .post-footer { margin-top: 12px; }
    .btn-like {
      background: none; border: 1px solid var(--border);
      border-radius: 20px; padding: 5px 14px;
      font-size: 13px; color: var(--muted);
      cursor: pointer; transition: all 0.2s;
      display: inline-flex; align-items: center; gap: 5px;
      font-family: 'Nunito', sans-serif; font-weight: 600;
    }
    .btn-like:hover { background: #e8f5e9; border-color: var(--green); color: var(--green); }

    /* ── WRITE POST FORM ── */
    .message-form { display: none; animation: fadeUp 0.4s ease; }
    .message-form textarea {
      width: 100%; padding: 12px 16px;
      border: 1px solid var(--border); border-radius: 12px;
      background: #f5f5f5;
      font-size: 14px; font-family: 'Nunito', sans-serif;
      resize: vertical; min-height: 80px; outline: none;
      transition: border-color 0.2s;
      color: var(--text);
    }
    .message-form textarea:focus { border-color: var(--blue); background: white; }
    .btn-post {
      margin-top: 10px; width: 100%; padding: 13px;
      background: var(--blue); color: white;
      border: none; border-radius: 12px;
      font-size: 14px; font-family: 'Nunito', sans-serif; font-weight: 700;
      cursor: pointer; transition: filter 0.2s;
    }
    .btn-post:hover { filter: brightness(1.1); }

    .empty-state { text-align: center; padding: 30px; color: var(--muted); font-style: italic; }
  </style>
</head>
<body>
<div class="page">

  <!-- ── AUTH CARD ── -->
  <div class="auth-card" id="authCard">

    <!-- Logged out -->
    <div class="login-state" id="loginState">
      <p class="login-prompt">Войдите, чтобы начать учёбу</p>
      <button class="btn-google" id="loginBtn">
        <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Войти через Google
      </button>
    </div>

    <!-- Logged in -->
    <div id="sessionPanel" style="display:none;">
      <div class="user-name-big" id="userNameBig">Пользователь</div>

      <!-- Study Timer -->
      <div class="timer-row">
        <span class="timer-icon">⏱️</span>
        <span class="timer-value" id="studyTimer">0 сек.</span>
      </div>

      <button class="btn btn-end-session" id="endSessionBtn">
        ⊖ Завершить сессию
      </button>
      <div class="btn-row">
        <button class="btn btn-break" id="breakBtn">☕ Перерыв</button>
        <button class="btn btn-logout" id="logoutBtn">Выход</button>
      </div>
    </div>
  </div>

  <!-- ── GROUP MONITOR ── -->
  <div class="card">
    <div class="card-title">👥 Монитор группы</div>
    <div id="groupMonitor">
      <div class="empty-state" style="padding:10px;">Загрузка...</div>
    </div>
  </div>

  <!-- ── GENERAL CHAT ── -->
  <div class="card">
    <div class="card-title">💬 Общий чат</div>
    <div class="chat-messages" id="chatMessages">
      <div class="empty-state" style="padding:6px;">Нет сообщений</div>
    </div>
    <div class="chat-input-row">
      <input class="chat-input" id="chatInput" type="text" placeholder="Сообщение..." maxlength="300">
      <button class="btn-send" id="chatSendBtn">▶</button>
    </div>
  </div>

  <!-- ── NEW POST FORM ── -->
  <div class="message-form card" id="messageForm">
    <div class="card-title">🌸 Новая запись</div>
    <textarea id="content" placeholder="О чём думаете сегодня?"></textarea>
    <button class="btn-post" id="mainBtn">✦ Опубликовать</button>
  </div>

  <!-- ── FEED ── -->
  <p class="feed-title">— записки —</p>
  <div id="feed"></div>

</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Firebase SDK (presence / realtime) -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, onDisconnect, onValue, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ── FIREBASE CONFIG (оставляем как было — пользователь должен подставить свой) ──
const firebaseConfig = {
  apiKey: "YOUR_FIREBASE_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

let fbApp, db;
try {
  fbApp = initializeApp(firebaseConfig);
  db = getDatabase(fbApp);
} catch(e) {
  console.warn('Firebase не настроен, присутствие работает через Supabase');
}

// ── SUPABASE ──
const SUPABASE_URL  = 'https://qlnucikuabffuwvuyirh.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsbnVjaWt1YWJmZnV3dnV5aXJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwODcxNjIsImV4cCI6MjA5MTY2MzE2Mn0.8iwddcCYbzlKpcmi_DfQ1Z-fxUQUuMLw4Rovk69FxsE';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

// ── STATE ──
let currentUser   = null;
let sessionStart  = null;   // Date когда началась текущая учёба
let timerInterval = null;
let onBreak       = false;
let breakStart    = null;
let totalBreakMs  = 0;

// ── ELEMENTS ──
const loginBtn      = document.getElementById('loginBtn');
const loginState    = document.getElementById('loginState');
const sessionPanel  = document.getElementById('sessionPanel');
const userNameBig   = document.getElementById('userNameBig');
const studyTimer    = document.getElementById('studyTimer');
const endSessionBtn = document.getElementById('endSessionBtn');
const breakBtn      = document.getElementById('breakBtn');
const logoutBtn     = document.getElementById('logoutBtn');
const messageForm   = document.getElementById('messageForm');
const chatInput     = document.getElementById('chatInput');
const chatSendBtn   = document.getElementById('chatSendBtn');

// ── FORMAT TIME ──
function fmtTime(ms) {
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  if (h > 0) return `${h}ч ${m}м ${s}с`;
  if (m > 0) return `${m}м ${s}с`;
  return `${s} сек.`;
}

function fmtTimeShort(ms) {
  const totalSec = Math.floor(ms / 1000);
  const h = String(Math.floor(totalSec / 3600)).padStart(2,'0');
  const m = String(Math.floor((totalSec % 3600) / 60)).padStart(2,'0');
  const s = String(totalSec % 60).padStart(2,'0');
  return `${h}ч${m}м${s}с`;
}

// ── TIMER TICK ──
function startTimerTick() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (!sessionStart || onBreak) return;
    const elapsed = Date.now() - sessionStart - totalBreakMs;
    studyTimer.textContent = fmtTime(elapsed);
  }, 1000);
}

// ── PRESENCE via Supabase presence table (fallback if no Firebase) ──
async function upsertPresence(status) {
  if (!currentUser) return;
  const elapsed = sessionStart ? Date.now() - sessionStart - totalBreakMs : 0;
  await sb.from('presence').upsert({
    uid: currentUser.id,
    name: currentUser.user_metadata?.full_name || currentUser.email,
    status,                      // 'online' | 'break' | 'offline'
    study_ms: elapsed,
    updated_at: new Date().toISOString()
  }, { onConflict: 'uid' });
}

// ── LOAD GROUP MONITOR ──
async function loadGroupMonitor() {
  const monitor = document.getElementById('groupMonitor');
  const { data, error } = await sb
    .from('presence')
    .select('*')
    .order('updated_at', { ascending: false });

  if (error || !data || data.length === 0) {
    monitor.innerHTML = '<div class="empty-state" style="padding:8px;font-size:13px;">Нет участников</div>';
    return;
  }

  monitor.innerHTML = data.map(m => {
    const isOnline  = m.status === 'online';
    const isBreak   = m.status === 'break';
    const dotClass  = isOnline ? 'online' : isBreak ? 'break' : 'offline';
    const badgeClass = isOnline ? 'badge-online' : isBreak ? 'badge-break' : 'badge-offline';
    const badgeText  = isOnline ? 'В учёбе' : isBreak ? 'Перерыв' : 'Дома';
    const timeStr    = m.study_ms ? fmtTimeShort(m.study_ms) : '0ч0м0с';

    return `
      <div class="member">
        <div class="member-left">
          <div class="online-dot ${dotClass}"></div>
          <span class="member-name">${esc(m.name || 'Гость')}</span>
        </div>
        <div class="member-right">
          <span class="status-badge ${badgeClass}">${badgeText}</span>
          <span class="member-time">⏱ ${timeStr}</span>
        </div>
      </div>`;
  }).join('');
}

// ── CHAT ──
async function loadChat() {
  const box = document.getElementById('chatMessages');
  const { data, error } = await sb
    .from('chat_messages')
    .select('*')
    .order('created_at', { ascending: true })
    .limit(50);

  if (error || !data || data.length === 0) {
    box.innerHTML = '<div class="empty-state" style="padding:6px;font-size:13px;">Нет сообщений</div>';
    return;
  }

  box.innerHTML = data.map(msg => {
    const t = msg.created_at
      ? new Date(msg.created_at).toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' })
      : '';
    return `
      <div class="chat-msg">
        <span class="msg-author">${esc(msg.name || 'Гость')}:</span>
        <span class="msg-text"> ${esc(msg.text)}</span>
        <span class="msg-time"> ${t}</span>
      </div>`;
  }).join('');
  box.scrollTop = box.scrollHeight;
}

async function sendChatMessage() {
  if (!currentUser) return alert('Войдите в систему');
  const text = chatInput.value.trim();
  if (!text) return;
  chatInput.value = '';
  await sb.from('chat_messages').insert({
    uid:  currentUser.id,
    name: currentUser.user_metadata?.full_name || currentUser.email,
    text
  });
  await loadChat();
}

chatSendBtn.onclick = sendChatMessage;
chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendChatMessage(); });

// ── REALTIME SUBSCRIPTIONS ──
function subscribeRealtime() {
  sb.channel('presence_changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'presence' }, loadGroupMonitor)
    .subscribe();

  sb.channel('chat_changes')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_messages' }, loadChat)
    .subscribe();
}

// ── AUTH UI ──
function updateUI(user) {
  currentUser = user;
  if (user) {
    loginState.style.display   = 'none';
    sessionPanel.style.display = 'block';
    messageForm.style.display  = 'block';
    userNameBig.textContent    = user.user_metadata?.full_name || user.email;
    document.getElementById('content') && (document.getElementById('content').placeholder = 'О чём думаете сегодня?');

    // Start session
    if (!sessionStart) {
      sessionStart  = Date.now();
      totalBreakMs  = 0;
      onBreak       = false;
    }
    startTimerTick();
    upsertPresence('online');
    loadGroupMonitor();
  } else {
    loginState.style.display   = 'block';
    sessionPanel.style.display = 'none';
    messageForm.style.display  = 'none';
    if (timerInterval) clearInterval(timerInterval);
    sessionStart = null;
    studyTimer.textContent = '0 сек.';
  }
}

// ── BUTTONS ──
loginBtn.onclick = async () => {
  await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } });
};

logoutBtn.onclick = async () => {
  await upsertPresence('offline');
  await sb.auth.signOut();
};

endSessionBtn.onclick = async () => {
  if (!confirm('Завершить учёбу?')) return;
  if (timerInterval) clearInterval(timerInterval);
  studyTimer.textContent = '0 сек.';
  sessionStart = null;
  totalBreakMs = 0;
  await upsertPresence('offline');
};

breakBtn.onclick = async () => {
  if (!onBreak) {
    onBreak    = true;
    breakStart = Date.now();
    breakBtn.textContent = '▶ Продолжить';
    breakBtn.style.background = '#66bb6a';
    breakBtn.style.color = 'white';
    await upsertPresence('break');
  } else {
    totalBreakMs += Date.now() - breakStart;
    onBreak    = false;
    breakStart = null;
    breakBtn.textContent = '☕ Перерыв';
    breakBtn.style.background = '';
    breakBtn.style.color = '';
    await upsertPresence('online');
  }
};

// ── POSTS ──
async function loadPosts() {
  const feed = document.getElementById('feed');
  const { data: { session } } = await sb.auth.getSession();
  const currentUid = session?.user?.id;
  const { data: posts, error } = await sb.from('posts').select('*').order('created_at', { ascending: false });

  if (error) { feed.innerHTML = '<div class="empty-state">Ошибка загрузки 🌸</div>'; return; }
  if (!posts || posts.length === 0) { feed.innerHTML = '<div class="empty-state">Пока тихо… Будьте первым 🌸</div>'; return; }

  feed.innerHTML = posts.map(post => {
    const time = post.created_at
      ? new Date(post.created_at).toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' })
      : '...';
    return `
      <div class="post">
        <div class="post-header">
          <img class="post-avatar" src="${post.photo || ''}" alt="">
          <div>
            <div class="post-name">${esc(post.name || 'Гость')}</div>
            <div class="post-time">${time}</div>
          </div>
        </div>
        <p class="post-text">${esc(post.text)}</p>
        <div class="post-footer">
          <button class="btn-like" onclick="processLike('${post.id}', ${post.likes || 0})">
            🌸 ${post.likes || 0}
          </button>
        </div>
      </div>`;
  }).join('');
}

window.processLike = async (id, currentLikes) => {
  await sb.from('posts').update({ likes: currentLikes + 1 }).eq('id', id);
  loadPosts();
};

document.getElementById('mainBtn').onclick = async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) return;
  const content = document.getElementById('content').value.trim();
  if (!content) return alert('Напишите что-нибудь 🌸');
  const user = session.user;
  const { error } = await sb.from('posts').insert({
    name: user.user_metadata?.full_name || user.email,
    email: user.email,
    photo: user.user_metadata?.avatar_url || '',
    uid: user.id,
    text: content,
    likes: 0
  });
  if (error) { alert('Ошибка! ' + error.message); } else {
    document.getElementById('content').value = '';
    loadPosts();
  }
};

// ── INIT ──
sb.auth.onAuthStateChange((_event, session) => { updateUI(session?.user ?? null); });
sb.auth.getSession().then(({ data: { session } }) => {
  updateUI(session?.user ?? null);
  loadPosts();
  loadChat();
  loadGroupMonitor();
  subscribeRealtime();
});

// Периодически обновляем присутствие
setInterval(() => { upsertPresence(onBreak ? 'break' : 'online'); }, 30000);

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
</script>
</body>
</html>
