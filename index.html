<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сакура — Облачные записки</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --petal-1: #fce4ec;
      --petal-2: #f8bbd0;
      --petal-3: #f48fb1;
      --petal-4: #e91e8c;
      --blush: #fdf0f5;
      --white: #fffcfe;
      --bark: #5d3a3a;
      --bark-light: #8b5e5e;
      --text: #3d2020;
      --text-soft: #a07070;
      --shadow: rgba(180, 80, 100, 0.12);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      background: var(--blush);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* ── Falling petals ── */
    .petals-container {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .petal {
      position: absolute; top: -60px;
      width: 18px; height: 18px;
      background: var(--petal-2);
      border-radius: 150% 0 150% 0;
      opacity: 0.7; animation: fall linear infinite;
    }
    .petal:nth-child(odd)  { background: var(--petal-1); border-radius: 0 150% 0 150%; width: 14px; height: 14px; }
    .petal:nth-child(3n)   { background: var(--petal-3); opacity: 0.4; width: 10px; height: 10px; }
    @keyframes fall {
      0%   { transform: translateY(-60px) rotate(0deg)   translateX(0);    opacity: 0.8; }
      25%  { transform: translateY(25vh)  rotate(90deg)  translateX(40px); }
      50%  { transform: translateY(50vh)  rotate(180deg) translateX(-20px);}
      75%  { transform: translateY(75vh)  rotate(270deg) translateX(30px); }
      100% { transform: translateY(110vh) rotate(360deg) translateX(-10px); opacity: 0; }
    }

    /* ── BG branches ── */
    .bg-branch      { position: fixed; top: -40px; right: -60px; width: 480px; opacity: 0.09; pointer-events: none; z-index: 0; }
    .bg-branch-left { position: fixed; bottom: -60px; left: -80px; width: 380px; opacity: 0.07; pointer-events: none; z-index: 0; transform: rotate(180deg) scaleX(-1); }

    /* ── Layout ── */
    .page { position: relative; z-index: 1; max-width: 560px; margin: 0 auto; padding: 48px 20px 80px; }

    /* ── Header ── */
    header { text-align: center; margin-bottom: 40px; }
    .logo-kanji { font-family: 'Cormorant Garamond', serif; font-size: 13px; letter-spacing: 0.3em; color: var(--petal-3); text-transform: uppercase; margin-bottom: 8px; }
    h1 { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: clamp(2rem, 6vw, 3rem); color: var(--bark); line-height: 1.1; letter-spacing: 0.02em; }
    h1 em { font-style: italic; color: var(--petal-3); }
    .subtitle { margin-top: 10px; font-size: 13px; color: var(--text-soft); letter-spacing: 0.08em; }
    .divider { width: 60px; height: 1px; background: linear-gradient(90deg, transparent, var(--petal-3), transparent); margin: 18px auto 0; }

    /* ── Auth ── */
    .auth-section {
      background: var(--white); border: 1px solid var(--petal-2); border-radius: 20px;
      padding: 22px 28px; margin-bottom: 28px; box-shadow: 0 4px 24px var(--shadow);
      display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
    }
    .login-prompt { font-size: 14px; color: var(--text-soft); font-style: italic; }
    .btn-google {
      display: flex; align-items: center; gap: 10px;
      background: linear-gradient(135deg, var(--petal-3), var(--petal-4));
      color: white; border: none; border-radius: 50px; padding: 11px 24px;
      font-size: 14px; font-family: 'Zen Kaku Gothic New', sans-serif;
      cursor: pointer; transition: all 0.3s ease;
      box-shadow: 0 3px 14px rgba(233,30,140,0.3); letter-spacing: 0.03em;
    }
    .btn-google:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(233,30,140,0.4); }
    .btn-google svg { width: 18px; height: 18px; }
    .auth-bar { display: none; align-items: center; gap: 12px; width: 100%; }
    .user-avatar { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--petal-2); object-fit: cover; }
    .user-name { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 600; color: var(--bark); flex: 1; }
    .btn-logout { background: transparent; border: 1px solid var(--petal-2); color: var(--text-soft); border-radius: 50px; padding: 7px 16px; font-size: 12px; cursor: pointer; transition: all 0.25s; font-family: 'Zen Kaku Gothic New', sans-serif; }
    .btn-logout:hover { border-color: var(--petal-3); color: var(--petal-3); }

    /* ── Post form ── */
    .message-form { background: var(--white); border: 1px solid var(--petal-2); border-radius: 20px; padding: 28px; margin-bottom: 32px; box-shadow: 0 4px 24px var(--shadow); display: none; animation: fadeUp 0.4s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .form-title { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 600; color: var(--bark); margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
    .form-title::before { content: '🌸'; font-size: 1rem; }
    .field-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    input, textarea { width: 100%; padding: 11px 16px; border: 1px solid var(--petal-2); border-radius: 12px; background: var(--blush); color: var(--text); font-size: 14px; font-family: 'Zen Kaku Gothic New', sans-serif; transition: border-color 0.2s; outline: none; }
    input:focus, textarea:focus { border-color: var(--petal-3); background: var(--white); }
    input[readonly] { color: var(--text-soft); cursor: default; }
    textarea { resize: vertical; min-height: 90px; margin-bottom: 12px; }
    .btn-post { width: 100%; padding: 13px; background: linear-gradient(135deg, var(--petal-2), var(--petal-3)); border: none; border-radius: 12px; color: var(--bark); font-size: 14px; font-family: 'Cormorant Garamond', serif; font-weight: 600; letter-spacing: 0.08em; cursor: pointer; transition: all 0.3s; box-shadow: 0 3px 12px var(--shadow); }
    .btn-post:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(180,80,120,0.2); }

    /* ── Feed ── */
    .feed-title { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 400; font-style: italic; color: var(--text-soft); text-align: center; margin-bottom: 20px; letter-spacing: 0.08em; }
    #feed { display: flex; flex-direction: column; gap: 16px; }
    .post { background: var(--white); border: 1px solid var(--petal-1); border-radius: 18px; padding: 20px 22px; box-shadow: 0 2px 16px var(--shadow); animation: fadeUp 0.3s ease; transition: transform 0.2s, box-shadow 0.2s; }
    .post:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(180,80,120,0.15); }
    .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }

    /* clickable author → DM */
    .post-author-btn { display: flex; align-items: center; gap: 10px; background: none; border: none; cursor: pointer; padding: 4px 8px; margin: -4px -8px; border-radius: 30px; transition: background 0.2s; text-align: left; flex: 1; }
    .post-author-btn:hover { background: var(--petal-1); }
    .post-author-btn .hint { font-size: 10px; color: var(--petal-3); margin-top: 1px; opacity: 0; transition: opacity 0.2s; }
    .post-author-btn:hover .hint { opacity: 1; }

    .post-avatar { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--petal-2); object-fit: cover; pointer-events: none; }
    .post-meta { display: flex; flex-direction: column; }
    .post-name { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 600; color: var(--bark); }
    .post-time { font-size: 11px; color: var(--text-soft); letter-spacing: 0.05em; }
    .post-text { font-size: 15px; line-height: 1.65; color: var(--text); }
    .post-footer { margin-top: 14px; display: flex; align-items: center; justify-content: space-between; }
    .btn-like { background: none; border: 1px solid var(--petal-2); border-radius: 50px; padding: 5px 14px; font-size: 13px; color: var(--text-soft); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 5px; }
    .btn-like:hover { background: var(--petal-1); border-color: var(--petal-3); color: var(--petal-4); }
    .btn-dm-inline { background: none; border: 1px solid var(--petal-2); border-radius: 50px; padding: 5px 14px; font-size: 12px; color: var(--text-soft); cursor: pointer; transition: all 0.2s; font-family: 'Zen Kaku Gothic New', sans-serif; }
    .btn-dm-inline:hover { background: var(--petal-1); border-color: var(--petal-3); color: var(--bark); }

    /* ── Empty / Footer ── */
    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-soft); font-style: italic; font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; }
    footer { text-align: center; margin-top: 60px; font-size: 12px; color: var(--petal-2); letter-spacing: 0.15em; }

    /* ════════════════════════════════════════
       DM SIDEBAR
    ════════════════════════════════════════ */
    .dm-overlay { position: fixed; inset: 0; background: rgba(93,58,58,0.25); backdrop-filter: blur(3px); z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
    .dm-overlay.open { opacity: 1; pointer-events: all; }

    .dm-sidebar { position: fixed; top: 0; right: 0; width: min(420px, 100vw); height: 100vh; background: var(--white); border-left: 1px solid var(--petal-2); box-shadow: -8px 0 40px rgba(180,80,100,0.18); z-index: 101; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); }
    .dm-sidebar.open { transform: translateX(0); }

    .dm-header { padding: 20px 22px 16px; border-bottom: 1px solid var(--petal-1); display: flex; align-items: center; gap: 12px; background: linear-gradient(135deg, var(--white), var(--petal-1)); flex-shrink: 0; }
    .dm-header-avatar { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--petal-3); object-fit: cover; }
    .dm-header-info { flex: 1; min-width: 0; }
    .dm-header-name { font-family: 'Cormorant Garamond', serif; font-size: 19px; font-weight: 600; color: var(--bark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dm-header-hint { font-size: 11px; color: var(--text-soft); margin-top: 1px; }
    .dm-close { background: none; border: none; cursor: pointer; color: var(--text-soft); font-size: 22px; line-height: 1; padding: 4px 8px; border-radius: 8px; transition: all 0.2s; flex-shrink: 0; }
    .dm-close:hover { background: var(--petal-1); color: var(--bark); }

    .dm-login-hint { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 32px; text-align: center; color: var(--text-soft); font-style: italic; font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; }

    .dm-messages { flex: 1; overflow-y: auto; padding: 18px 18px 8px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
    .dm-messages::-webkit-scrollbar { width: 4px; }
    .dm-messages::-webkit-scrollbar-thumb { background: var(--petal-2); border-radius: 4px; }

    .dm-bubble-wrap { display: flex; flex-direction: column; max-width: 78%; }
    .dm-bubble-wrap.mine   { align-self: flex-end;   align-items: flex-end; }
    .dm-bubble-wrap.theirs { align-self: flex-start; align-items: flex-start; }
    .dm-bubble { padding: 10px 15px; border-radius: 18px; font-size: 14px; line-height: 1.55; word-break: break-word; }
    .dm-bubble-wrap.mine .dm-bubble   { background: linear-gradient(135deg, var(--petal-3), var(--petal-4)); color: white; border-bottom-right-radius: 4px; }
    .dm-bubble-wrap.theirs .dm-bubble { background: var(--petal-1); color: var(--text); border-bottom-left-radius: 4px; border: 1px solid var(--petal-2); }
    .dm-bubble-time { font-size: 10px; color: var(--text-soft); margin-top: 3px; padding: 0 4px; }

    .dm-day-sep { text-align: center; font-size: 11px; color: var(--text-soft); font-family: 'Cormorant Garamond', serif; font-style: italic; letter-spacing: 0.1em; margin: 6px 0; }

    .dm-empty { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; color: var(--text-soft); font-style: italic; font-family: 'Cormorant Garamond', serif; font-size: 1rem; text-align: center; padding: 24px; }

    .dm-input-area { padding: 14px 16px; border-top: 1px solid var(--petal-1); display: flex; gap: 10px; align-items: flex-end; background: var(--white); flex-shrink: 0; }
    .dm-input-area textarea { flex: 1; min-height: 40px; max-height: 120px; padding: 10px 14px; border-radius: 20px; resize: none; font-size: 14px; line-height: 1.4; margin-bottom: 0; }
    .dm-send { width: 42px; height: 42px; border-radius: 50%; border: none; flex-shrink: 0; background: linear-gradient(135deg, var(--petal-3), var(--petal-4)); color: white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; box-shadow: 0 3px 10px rgba(233,30,140,0.3); }
    .dm-send:hover  { transform: scale(1.08); box-shadow: 0 5px 14px rgba(233,30,140,0.4); }
    .dm-send:active { transform: scale(0.96); }
  </style>
</head>
<body>

<div class="petals-container" id="petalsContainer"></div>

<svg class="bg-branch" viewBox="0 0 400 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M380 10 Q320 80 260 140 Q200 200 180 300 Q160 400 170 490" stroke="#e91e8c" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M260 140 Q220 100 180 80 Q140 60 100 50" stroke="#e91e8c" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M260 140 Q280 110 310 90" stroke="#e91e8c" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M200 220 Q160 200 120 195 Q90 192 60 200" stroke="#e91e8c" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M190 290 Q230 270 260 250" stroke="#e91e8c" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="100" cy="50" r="8" fill="#f48fb1"/><circle cx="115" cy="42" r="6" fill="#fce4ec"/><circle cx="88" cy="42" r="6" fill="#f8bbd0"/>
  <circle cx="60" cy="200" r="7" fill="#f48fb1"/><circle cx="74" cy="193" r="5" fill="#fce4ec"/><circle cx="50" cy="193" r="5" fill="#f8bbd0"/>
  <circle cx="310" cy="90" r="7" fill="#f48fb1"/><circle cx="322" cy="83" r="5" fill="#fce4ec"/><circle cx="300" cy="83" r="5" fill="#f8bbd0"/>
  <circle cx="260" cy="250" r="6" fill="#f48fb1"/><circle cx="270" cy="244" r="4" fill="#fce4ec"/>
  <circle cx="170" cy="490" r="8" fill="#f48fb1"/><circle cx="160" cy="480" r="6" fill="#fce4ec"/>
</svg>
<svg class="bg-branch-left" viewBox="0 0 400 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M380 10 Q320 80 260 140 Q200 200 180 300 Q160 400 170 490" stroke="#e91e8c" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M260 140 Q220 100 180 80 Q140 60 100 50" stroke="#e91e8c" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M200 220 Q160 200 120 195 Q90 192 60 200" stroke="#e91e8c" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="100" cy="50" r="8" fill="#f48fb1"/><circle cx="115" cy="42" r="6" fill="#fce4ec"/>
  <circle cx="60" cy="200" r="7" fill="#f48fb1"/><circle cx="74" cy="193" r="5" fill="#fce4ec"/>
</svg>

<!-- DM Sidebar -->
<div class="dm-overlay" id="dmOverlay"></div>
<div class="dm-sidebar" id="dmSidebar">
  <div class="dm-header" id="dmHeader">
    <img class="dm-header-avatar" id="dmHeaderAvatar" src="" alt="">
    <div class="dm-header-info">
      <div class="dm-header-name" id="dmHeaderName">…</div>
      <div class="dm-header-hint">личные сообщения 🌸</div>
    </div>
    <button class="dm-close" id="dmClose" title="Закрыть">✕</button>
  </div>
  <div class="dm-login-hint" id="dmLoginHint" style="display:none;">
    🌸<br>Войдите через Google,<br>чтобы отправлять личные сообщения
  </div>
  <div class="dm-messages" id="dmMessages"></div>
  <div class="dm-input-area" id="dmInputArea">
    <textarea id="dmText" placeholder="Напишите сообщение…" rows="1"
      oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
    <button class="dm-send" id="dmSendBtn" title="Отправить">➤</button>
  </div>
</div>

<!-- Main page -->
<div class="page">
  <header>
    <div class="logo-kanji">桜 · Sakura Notes</div>
    <h1>Весенние <em>записки</em></h1>
    <p class="subtitle">Поделитесь мыслью — пусть она летит, как лепесток</p>
    <div class="divider"></div>
  </header>

  <div class="auth-section" id="authSection">
    <span class="login-prompt" id="loginPrompt">Войдите, чтобы оставить запись</span>
    <button class="btn-google" id="loginBtn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="white">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Войти через Google
    </button>
    <div class="auth-bar" id="userInfo">
      <img class="user-avatar" id="userPhoto" src="" alt="Avatar">
      <span class="user-name" id="userName"></span>
      <button class="btn-logout" id="logoutBtn">Выйти</button>
    </div>
  </div>

  <div class="message-form" id="messageForm">
    <div class="form-title">Новая запись</div>
    <div class="field-group">
      <input type="text"  id="name"  placeholder="Имя"   readonly>
      <input type="email" id="email" placeholder="Email" readonly>
    </div>
    <textarea id="content" placeholder="О чём думаете этой весной?"></textarea>
    <button class="btn-post" id="mainBtn">✦ Опубликовать в облако</button>
  </div>

  <p class="feed-title">— лепестки мыслей —</p>
  <div id="feed"></div>

  <footer>桜 · весна всегда возвращается · 桜</footer>
</div>

<script type="module">
// ── Petals ──
const pc = document.getElementById('petalsContainer');
for (let i = 0; i < 22; i++) {
  const p = document.createElement('div');
  p.className = 'petal';
  p.style.left = Math.random() * 100 + 'vw';
  p.style.animationDuration = (8 + Math.random() * 12) + 's';
  p.style.animationDelay    = (Math.random() * 15) + 's';
  pc.appendChild(p);
}

// ════════════════════════════════════════════════════
//  FIREBASE — вставьте свою конфигурацию ниже
// ════════════════════════════════════════════════════
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, query, orderBy,
  onSnapshot, serverTimestamp, updateDoc, doc, increment
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import {
  getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

  const firebaseConfig = {

    apiKey: "AIzaSyBn3E0b-hAlhly68hVemfta8DMmzX6zAtw",

    authDomain: "sakura-notes.firebaseapp.com",

    projectId: "sakura-notes",

    storageBucket: "sakura-notes.firebasestorage.app",

    messagingSenderId: "267000760878",

    appId: "1:267000760878:web:49643bd1c35a92c0ab2dbf",

    measurementId: "G-LRZ9NEML81"

  };


const app      = initializeApp(firebaseConfig);
const db       = getFirestore(app);
const auth     = getAuth(app);
const provider = new GoogleAuthProvider();

// ── Auth ──────────────────────────────────────────────
const loginBtn    = document.getElementById('loginBtn');
const logoutBtn   = document.getElementById('logoutBtn');
const userInfo    = document.getElementById('userInfo');
const loginPrompt = document.getElementById('loginPrompt');
const messageForm = document.getElementById('messageForm');

loginBtn.onclick  = () => signInWithPopup(auth, provider);
logoutBtn.onclick = () => signOut(auth);

onAuthStateChanged(auth, (user) => {
  if (user) {
    loginBtn.style.display    = 'none';
    loginPrompt.style.display = 'none';
    userInfo.style.display    = 'flex';
    messageForm.style.display = 'block';
    document.getElementById('userName').innerText = user.displayName;
    document.getElementById('userPhoto').src      = user.photoURL;
    document.getElementById('name').value         = user.displayName;
    document.getElementById('email').value        = user.email;
  } else {
    loginBtn.style.display    = 'flex';
    loginPrompt.style.display = 'block';
    userInfo.style.display    = 'none';
    messageForm.style.display = 'none';
  }
});

// ── Likes ──────────────────────────────────────────────
window.processLike = async (id) => {
  await updateDoc(doc(db, "requests", id), { likes: increment(1) });
};

// ── Publish post ───────────────────────────────────────
document.getElementById('mainBtn').onclick = async () => {
  const content = document.getElementById('content').value.trim();
  if (!content) return alert("Напишите что-нибудь 🌸");
  try {
    await addDoc(collection(db, "requests"), {
      name:      auth.currentUser.displayName,
      email:     auth.currentUser.email,
      photo:     auth.currentUser.photoURL,
      uid:       auth.currentUser.uid,       // ← нужен для DM
      text:      content,
      likes:     0,
      timestamp: serverTimestamp()
    });
    document.getElementById('content').value = "";
  } catch (e) {
    alert("Ошибка безопасности! Проверьте Rules в Firebase.");
  }
};

// ── Real-time feed ────────────────────────────────────
const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
onSnapshot(q, (snapshot) => {
  const feed = document.getElementById('feed');
  feed.innerHTML = "";
  if (snapshot.empty) {
    feed.innerHTML = '<div class="empty-state">Пока тихо… Будьте первым лепестком 🌸</div>';
    return;
  }
  snapshot.forEach((d) => {
    const data  = d.data();
    const isSelf = auth.currentUser && auth.currentUser.uid === data.uid;
    // Serialize peer safely
    const peer = JSON.stringify({
      uid:   data.uid   || "",
      name:  data.name  || "Неизвестный",
      photo: data.photo || "",
    }).replace(/'/g, "&#39;");

    const dmBtn = !isSelf && data.uid
      ? `<button class="btn-dm-inline" onclick="openDM('${peer}')">✉ Написать</button>`
      : '';

    feed.innerHTML += `
      <div class="post">
        <div class="post-header">
          ${data.uid && !isSelf
            ? `<button class="post-author-btn" onclick="openDM('${peer}')">
                 <img class="post-avatar" src="${data.photo || ''}" alt="">
                 <div class="post-meta">
                   <div class="post-name">${data.name || 'Гость'}</div>
                   <div class="post-time">${data.timestamp?.toDate().toLocaleTimeString('ru') || '...'}</div>
                   <div class="hint">✉ написать в личные</div>
                 </div>
               </button>`
            : `<div style="display:flex;align-items:center;gap:10px;padding:4px 8px;">
                 <img class="post-avatar" src="${data.photo || ''}" alt="">
                 <div class="post-meta">
                   <div class="post-name">${data.name || 'Гость'}</div>
                   <div class="post-time">${data.timestamp?.toDate().toLocaleTimeString('ru') || '...'}</div>
                 </div>
               </div>`
          }
        </div>
        <p class="post-text">${data.text}</p>
        <div class="post-footer">
          <button class="btn-like" onclick="processLike('${d.id}')">🌸 ${data.likes || 0}</button>
          ${dmBtn}
        </div>
      </div>`;
  });
});

// ════════════════════════════════════════════════════
//  DM SYSTEM
// ════════════════════════════════════════════════════
const dmOverlay   = document.getElementById('dmOverlay');
const dmSidebar   = document.getElementById('dmSidebar');
const dmClose     = document.getElementById('dmClose');
const dmMessages  = document.getElementById('dmMessages');
const dmInputArea = document.getElementById('dmInputArea');
const dmLoginHint = document.getElementById('dmLoginHint');
const dmSendBtn   = document.getElementById('dmSendBtn');
const dmText      = document.getElementById('dmText');

let currentPeer   = null;
let dmUnsub       = null;

// Deterministic conversation ID — same for both participants
function convId(uidA, uidB) {
  return [uidA, uidB].sort().join('__');
}

// openDM accepts a JSON string (called from inline onclick)
window.openDM = (peerJson) => {
  const peer = typeof peerJson === 'string' ? JSON.parse(peerJson) : peerJson;
  if (auth.currentUser && auth.currentUser.uid === peer.uid) return;

  currentPeer = peer;
  document.getElementById('dmHeaderAvatar').src     = peer.photo || '';
  document.getElementById('dmHeaderName').innerText = peer.name;

  if (!auth.currentUser) {
    dmLoginHint.style.display  = 'flex';
    dmInputArea.style.display  = 'none';
    dmMessages.style.display   = 'none';
  } else {
    dmLoginHint.style.display  = 'none';
    dmInputArea.style.display  = 'flex';
    dmMessages.style.display   = 'flex';
    startListeningDM(peer);
  }

  dmOverlay.classList.add('open');
  dmSidebar.classList.add('open');
};

function closeDM() {
  dmOverlay.classList.remove('open');
  dmSidebar.classList.remove('open');
  if (dmUnsub) { dmUnsub(); dmUnsub = null; }
  currentPeer = null;
  dmMessages.innerHTML = '';
}
dmClose.onclick   = closeDM;
dmOverlay.onclick = closeDM;

function startListeningDM(peer) {
  if (dmUnsub) dmUnsub();
  dmMessages.innerHTML = '';

  const me  = auth.currentUser;
  const cid = convId(me.uid, peer.uid);
  const ref = collection(db, "dms", cid, "messages");
  const mq  = query(ref, orderBy("timestamp", "asc"));

  dmUnsub = onSnapshot(mq, (snap) => {
    dmMessages.innerHTML = '';
    if (snap.empty) {
      dmMessages.innerHTML = `
        <div class="dm-empty">
          🌸<br>Начните разговор первым —<br>пусть слова летят, как лепестки
        </div>`;
      return;
    }
    let lastDay = '';
    snap.forEach((d) => {
      const msg  = d.data();
      const mine = msg.senderUid === me.uid;
      const ts   = msg.timestamp?.toDate();
      const day  = ts ? ts.toLocaleDateString('ru', { day:'numeric', month:'long' }) : '';
      const time = ts ? ts.toLocaleTimeString('ru', { hour:'2-digit', minute:'2-digit' }) : '';

      if (day && day !== lastDay) {
        lastDay = day;
        const sep = document.createElement('div');
        sep.className   = 'dm-day-sep';
        sep.textContent = `— ${day} —`;
        dmMessages.appendChild(sep);
      }

      const wrap = document.createElement('div');
      wrap.className = `dm-bubble-wrap ${mine ? 'mine' : 'theirs'}`;
      wrap.innerHTML  = `
        <div class="dm-bubble">${esc(msg.text)}</div>
        <div class="dm-bubble-time">${time}</div>`;
      dmMessages.appendChild(wrap);
    });
    dmMessages.scrollTop = dmMessages.scrollHeight;
  });
}

async function sendDM() {
  if (!auth.currentUser || !currentPeer) return;
  const text = dmText.value.trim();
  if (!text) return;
  const me  = auth.currentUser;
  const cid = convId(me.uid, currentPeer.uid);
  dmText.value = '';
  dmText.style.height = 'auto';
  try {
    await addDoc(collection(db, "dms", cid, "messages"), {
      text,
      senderUid:   me.uid,
      senderName:  me.displayName,
      senderPhoto: me.photoURL,
      receiverUid: currentPeer.uid,
      timestamp:   serverTimestamp()
    });
  } catch (e) {
    alert("Не удалось отправить. Проверьте Rules в Firebase.");
  }
}

dmSendBtn.onclick = sendDM;
dmText.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendDM(); }
});

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

window.db = db;
</script>
</body>
</html>
